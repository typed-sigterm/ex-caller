name = "ex-caller"
compatibility_date = "2026-05-21"
preview_urls = true

[assets]
directory = "./dist"

[build]
command = "bun run build:web"

[vars]
EXC_NO_APP = "1"

[route]
pattern = "ex-caller.by-ts.top"
custom_domain = true

[env.canary.vars]
EXC_NO_APP = "1"
EXC_CANARY = "1"

[env.canary.route]
pattern = "canary.ex-caller.by-ts.top"
custom_domain = true
